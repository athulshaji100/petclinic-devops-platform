---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: vets-service
  labels:
    app: vets-service-label

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vets-service-label

  template:
    metadata:
      labels:
        app: vets-service-label

    spec:
      containers:
        - name: vets-service
          image: 194680606620.dkr.ecr.ap-south-1.amazonaws.com/petclinic-vets-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8083

          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-secret
                  key: host

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-secret
                  key: dbname

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-secret
                  key: username

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: petclinic-db-secret
                  key: password

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://$(DB_HOST):3306/$(DB_NAME)"

---
apiVersion: v1
kind: Service

metadata:
  name: vets-service-service

spec:
  selector:
    app: vets-service-label

  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083

  type: ClusterIP