---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: customers-service
  labels:
    app: customers-service-label

spec:
  replicas: 1

  selector:
    matchLabels:
      app: customers-service-label

  template:
    metadata:
      labels:
        app: customers-service-label

    spec:
      containers:
        - name: customers-service
          image: 194680606620.dkr.ecr.ap-south-1.amazonaws.com/petclinic-customers-service:1.0
          ports:
            - containerPort: 8081

---
apiVersion: v1
kind: Service

metadata:
  name: customers-service-service

spec:
  selector:
    app: customers-service-label

  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081

  type: LoadBalancer