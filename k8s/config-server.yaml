---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: config-server
  labels:
    app: config-server-label

spec:
  replicas: 1

  selector:
    matchLabels:
      app: config-server-label

  template:
    metadata:
      labels:
        app: config-server-label

    spec:
      containers:
        - name: config-server
          image: 194680606620.dkr.ecr.ap-south-1.amazonaws.com/petclinic-config-server:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8888

---
apiVersion: v1
kind: Service

metadata:
  name: config-server-service

spec:
  selector:
    app: config-server-label

  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888

  type: ClusterIP