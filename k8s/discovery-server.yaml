---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: discovery-server
  labels:
    app: discovery-server-label

spec:
  replicas: 1

  selector:
    matchLabels:
      app: discovery-server-label

  template:
    metadata:
      labels:
        app: discovery-server-label

    spec:
      containers:
        - name: discovery-server
          image: 194680606620.dkr.ecr.ap-south-1.amazonaws.com/petclinic-discovery-server:1.0
          ports:
            - containerPort: 8761

---
apiVersion: v1
kind: Service

metadata:
  name: discovery-server-service

spec:
  selector:
    app: discovery-server-label

  ports:
    - protocol: TCP
      port: 8761
      targetPort: 8761

  type: ClusterIP